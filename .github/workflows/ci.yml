name: CI

# CI runs on push/PR to main.
# (No tag trigger for now.)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Minimal default permissions for the whole workflow.
permissions:
  contents: read

jobs:
  # Quality matrix for the 2 Python projects in this repository.
  tests:
    name: pytest (${{ matrix.project }}, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [ manager, runner ]
        python-version: [ "3.11", "3.12", "3.13" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          working-directory: ${{ matrix.project }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          cache-suffix: ${{ matrix.project }}-py${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: |
          uv sync --locked --extra dev

      - name: Format check (black + isort)
        working-directory: ${{ matrix.project }}
        run: |
          make fmt-check

      - name: Lint (flake8 + mypy)
        working-directory: ${{ matrix.project }}
        run: |
          make lint

      - name: Test
        working-directory: ${{ matrix.project }}
        run: |
          make test

      - name: Coverage
        working-directory: ${{ matrix.project }}
        run: |
          make coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-${{ matrix.project }}-py${{ matrix.python-version }}
          path: ${{ matrix.project }}/htmlcov/
          retention-days: 14

  # Docker job kept in CI, but actual execution is controlled
  # via the repository variable ENABLE_DOCKER_IMAGES=true.
  docker:
    name: docker (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: tests
    # Local permission override: GHCR publication is possible
    # only when the feature flag is enabled.
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: manager
            image_name: esup-runner-manager
          - project: runner
            image_name: esup-runner-runner
    env:
      # Multi-arch build only on push.
      DOCKER_PLATFORMS: ${{ github.event_name == 'push' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}

    steps:
      - name: Docker build/publish disabled
        if: vars.ENABLE_DOCKER_IMAGES != 'true'
        run: echo "Docker image build and publication are disabled. Set ENABLE_DOCKER_IMAGES=true to enable them."

      - name: Checkout
        if: vars.ENABLE_DOCKER_IMAGES == 'true'
        uses: actions/checkout@v6

      - name: Set up QEMU
        if: vars.ENABLE_DOCKER_IMAGES == 'true' && github.event_name == 'push'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: vars.ENABLE_DOCKER_IMAGES == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: vars.ENABLE_DOCKER_IMAGES == 'true' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # github.actor = user/bot that triggered the workflow.
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: vars.ENABLE_DOCKER_IMAGES == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            # latest only on the default branch.
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            # SemVer tags are generated if the workflow is triggered
            # on Git tag refs (for example: v1.2.3).
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=${{ matrix.image_name }}
            org.opencontainers.image.description=ESUP Runner ${{ matrix.project }} Docker image

      - name: Build and publish Docker image
        if: vars.ENABLE_DOCKER_IMAGES == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.project }}
          file: ./${{ matrix.project }}/Dockerfile
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.project }}
          cache-to: type=gha,mode=max,scope=${{ matrix.project }}

  # "Gate" job used by branch protection rules.
  required:
    name: required
    runs-on: ubuntu-latest
    needs:
      - tests
      - docker
    steps:
      - run: echo "All matrix jobs passed."
