name: Code Formatting

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: code-formatting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-formatting:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv + Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            manager/pyproject.toml
            manager/uv.lock
            runner/pyproject.toml
            runner/uv.lock
          cache-suffix: format-py311

      - name: Show uv version
        run: uv --version

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install manager dev dependencies
        working-directory: manager
        run: uv sync --locked --extra dev

      - name: Install runner dev dependencies
        working-directory: runner
        run: uv sync --locked --extra dev

      - name: Format manager Python (black + isort)
        working-directory: manager
        run: make fmt

      - name: Format runner Python (black + isort)
        working-directory: runner
        run: make fmt

      - name: Format manager web assets (Prettier)
        run: |
          npx --yes prettier@3 --write \
            manager/app/web/static/*.js \
            manager/app/web/static/*.css

      - name: Commit and push formatting changes
        run: |
          if git diff --quiet; then
            echo "No formatting changes to commit."
            exit 0
          fi
          git add -A
          git commit -m "chore: auto-format code"
          git push origin HEAD:${{ github.ref_name }}
